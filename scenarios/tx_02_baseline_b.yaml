name: tx_02_baseline_b
kind: write
network: "${HARNESS_DEFAULT_NETWORK}"

contract:
  address: "${GLH_TEST_CONTRACT_ADDRESS}"
  function_name: "${GLH_TEST_WRITE_FN}"
  args: ["baseline-b-${HARNESS_DEFAULT_NETWORK}"]

run:
  repeat: 1
  concurrency: 1
  wait_status: finalized
  debug: on-fail
  timeout_seconds: 90
  poll_interval_seconds: 1.0
  tags: [asimov, minimal, baseline]

gas_profile:
  mode: preset
  preset: normal

expect:
  allowed_final_statuses: [FINALIZED, ACCEPTED]
  allowed_execution_results: [FINISHED_WITH_RETURN]
  state_check:
    enabled: true
    function_name: "${GLH_TEST_STATE_READ_FN}"
    expected: "baseline-b-${HARNESS_DEFAULT_NETWORK}"
