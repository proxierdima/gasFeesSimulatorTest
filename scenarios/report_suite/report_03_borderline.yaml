name: report_borderline_gas_write
kind: write
network: ${HARNESS_DEFAULT_NETWORK}

contract:
  address: "${GLH_TEST_CONTRACT_ADDRESS}"
  function_name: "${GLH_TEST_WRITE_FN}"
  args: ["borderline-${HARNESS_DEFAULT_NETWORK}"]

run:
  repeat: 3
  concurrency: 1
  wait_status: finalized
  debug: on-fail
  timeout_seconds: 90
  poll_interval_seconds: 1.0
  tags: [report, borderline]

gas_profile:
  mode: preset
  preset: borderline

expect:
  allowed_final_statuses: [OUT_OF_FEE, FINALIZED, ACCEPTED]
  allowed_execution_results: [FINISHED_WITH_ERROR, FINISHED_WITH_RETURN]
  expect_out_of_fee: true
  expect_possible_failure: true
